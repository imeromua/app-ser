<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Імпорт файлів</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <style>
    body { background: #f0f4f8; }
    .upload-area {
      border: 2.5px dashed #4472C4; border-radius: 12px; padding: 40px 24px;
      text-align: center; cursor: pointer; transition: .25s; background: #fff;
    }
    .upload-area:hover, .upload-area.drag { background: #e8effc; border-color: #1F3864; }
    .upload-icon { font-size: 48px; }
    .page-card {
      border-radius: 12px !important;
      box-shadow: 0 4px 18px rgba(0,0,0,.12) !important;
    }
    .page-card .card-header {
      background: #1F3864; color: #fff; font-weight: 700;
      border-radius: 12px 12px 0 0 !important;
    }
    .table-imports th { background: #1F3864; color: #fff; }
    .badge-strategy { font-size: .75rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4" style="background:#1F3864;">
  <div class="container">
    <a href="/" class="btn btn-outline-light btn-sm me-3">← На головну</a>
    <span class="navbar-brand mb-0 h5">📥 Імпорт файлів</span>
  </div>
</nav>

<div class="container pb-5">
  <!-- Upload card -->
  <div class="card page-card mb-4">
    <div class="card-header">📂 Завантаження XLS-файлу</div>
    <div class="card-body">
      <form id="form" action="/upload" method="post" enctype="multipart/form-data">
        <div class="upload-area" id="drop" onclick="document.getElementById('fi').click()">
          <div class="upload-icon">📊</div>
          <p class="fs-5 mt-2 mb-1 fw-semibold">Перетягніть XLS-файл сюди</p>
          <p class="text-muted small">або натисніть щоб обрати</p>
          <p id="fn" class="text-success fw-semibold mt-2"></p>
        </div>
        <input type="file" id="fi" name="files" accept=".xls,.xlsx" class="d-none" multiple>
        <div class="btn-group w-100 mt-3" role="group">
          <input type="radio" class="btn-check" name="report_type" id="rt_detail" value="detail" checked>
          <label class="btn btn-outline-primary" for="rt_detail">📅 Детальний (по місяцях)</label>
          <input type="radio" class="btn-check" name="report_type" id="rt_summary" value="summary">
          <label class="btn btn-outline-success" for="rt_summary">📊 Сумарний</label>
          <input type="radio" class="btn-check" name="report_type" id="rt_document" value="document">
          <label class="btn btn-outline-warning" for="rt_document">📄 По документах</label>
        </div>
        <div id="spin" class="mt-3 text-center d-none">
          <div class="spinner-border text-primary me-2" role="status"></div>
          <span>Обробляємо файл...</span>
        </div>
        <button type="submit" id="btn" class="btn btn-primary w-100 mt-3" disabled>🔍 Аналізувати та зберегти</button>
      </form>
    </div>
  </div>

  <!-- Result block (shown after successful upload) -->
  <div id="result-block" class="d-none mb-4">
    <div class="alert alert-success" id="result-msg"></div>
  </div>

  <!-- Import log -->
  <div class="card page-card">
    <div class="card-header">📋 Журнал імпортів</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-imports">
            <tr>
              <th>Дата</th>
              <th>Файл</th>
              <th>Магазин</th>
              <th>Склад</th>
              <th>Період</th>
              <th>Операцій</th>
              <th>Стратегія</th>
            </tr>
          </thead>
          <tbody id="imports-tbody">
            <tr><td colspan="7" class="text-center text-muted py-3">Завантаження...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmNNKHNQn3TXFrKzuAMC3bBKNmW"
        crossorigin="anonymous"></script>
<script>
const drop = document.getElementById('drop'),
      fi   = document.getElementById('fi'),
      btn  = document.getElementById('btn'),
      fn   = document.getElementById('fn'),
      form = document.getElementById('form'),
      spin = document.getElementById('spin');

fi.addEventListener('change', () => {
  if (fi.files.length) {
    fn.textContent = '✓ ' + Array.from(fi.files).map(f => f.name).join(', ');
    btn.disabled = false;
  }
});
['dragenter','dragover'].forEach(e => drop.addEventListener(e, ev => {
  ev.preventDefault(); drop.classList.add('drag');
}));
['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => {
  ev.preventDefault(); drop.classList.remove('drag');
}));
drop.addEventListener('drop', ev => {
  const files = ev.dataTransfer.files;
  if (files.length) {
    const dt = new DataTransfer();
    Array.from(files).forEach(f => dt.items.add(f));
    fi.files = dt.files;
    fn.textContent = '✓ ' + Array.from(files).map(f => f.name).join(', ');
    btn.disabled = false;
  }
});
form.addEventListener('submit', () => { spin.classList.remove('d-none'); btn.disabled = true; });

function strategyBadge(s) {
  const map = {
    'FULL_INSERT': 'bg-success',
    'DELTA_INSERT': 'bg-primary',
    'SKIP': 'bg-secondary',
  };
  const cls = map[s] || 'bg-secondary';
  return `<span class="badge ${cls} badge-strategy">${s || '—'}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return iso.replace('T', ' ').slice(0, 16);
}

function loadImports() {
  fetch('/api/imports')
    .then(r => r.json())
    .then(rows => {
      const tbody = document.getElementById('imports-tbody');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-3">Немає записів</td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(r => `
        <tr>
          <td>${fmtDate(r.uploaded_at)}</td>
          <td class="text-truncate" style="max-width:180px" title="${r.filename || ''}">${r.filename || '—'}</td>
          <td>${r.shop || '—'}</td>
          <td>${r.warehouse || '—'}</td>
          <td>${fmtDate(r.period_from)} — ${fmtDate(r.period_to)}</td>
          <td>${r.ops_inserted ?? '—'}</td>
          <td>${strategyBadge(r.strategy)}</td>
        </tr>
      `).join('');
    })
    .catch(() => {
      document.getElementById('imports-tbody').innerHTML =
        '<tr><td colspan="7" class="text-center text-muted py-3">Помилка завантаження</td></tr>';
    });
}

loadImports();
</script>
</body>
</html>
