<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>Вхід — Рух товарів</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    :root {
      --bg-dark:     #0f1117;
      --bg-card:     #1a1d27;
      --bg-card-2:   #222536;
      --accent-blue: #4f8ef7;
      --accent-green:#2ecc71;
      --text-primary:#e8eaf0;
      --text-muted:  #7a7f9a;
      --border:      #2d3148;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .login-logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo .logo-icon {
      font-size: 2.4rem;
    }
    .login-logo .logo-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 6px;
    }
    .login-logo .logo-title span {
      color: var(--accent-blue);
    }
    .form-label {
      color: var(--text-muted);
      font-size: .875rem;
      margin-bottom: 4px;
    }
    .form-control {
      background: var(--bg-card-2);
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .form-control:focus {
      background: var(--bg-card-2);
      border-color: var(--accent-blue);
      color: var(--text-primary);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.18);
      outline: none;
    }
    .btn-login {
      background: var(--accent-green);
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 11px;
      border-radius: 8px;
      font-size: 1rem;
      transition: opacity .2s;
    }
    .btn-login:hover {
      opacity: 0.88;
      color: #fff;
    }
    .error-msg {
      color: #e74c3c;
      font-size: .875rem;
      margin-top: 12px;
      text-align: center;
    }
    .app-footer {
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.78rem;
      text-align: center;
      padding: 12px 16px;
      margin-top: auto;
    }
    .app-footer a {
      color: var(--accent-blue);
      text-decoration: none;
    }
    .app-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">📦</div>
      <div class="logo-title">Рух <span>товарів</span></div>
    </div>
    <form method="post">
      <div class="mb-3">
        <label class="form-label" for="login">Логін</label>
        <input type="text" class="form-control" id="login" name="login" autocomplete="username" autofocus required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Пароль</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-login w-100 mt-1">Увійти</button>
      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</div>
<footer class="app-footer">
  © <span class="footer-year"></span> Yuzko Oleksandr ·
  <a href="mailto:yuzko.s@gmail.com">yuzko.s@gmail.com</a> ·
  <a href="https://github.com/imeromua" target="_blank" rel="noopener">github.com/imeromua</a><br>
  Захищено авторським правом. Всі права захищено.
</footer>
<script>
document.querySelectorAll('.footer-year').forEach(function(el) {
    el.textContent = new Date().getFullYear();
});
</script>
</body>
</html>
